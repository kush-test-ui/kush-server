version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - echo Build started on `date`
      - echo Checking for Dockerfile...
      - ls -al Dockerfile
  build:
    commands:
      - echo Building the Docker image...
      - docker build -t kush-e-commerce-back:$CODEBUILD_SOURCE_VERSION .
      - echo Tagging the Docker image...
      - docker tag kush-e-commerce-back:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/kush-e-commerce-back:$CODEBUILD_SOURCE_VERSION
  post_build:
    commands:
      - echo Pushing the Docker image to ECR...
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/kush-e-commerce-back:$CODEBUILD_SOURCE_VERSIONs
      - echo Build completed on `date`