version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - echo Installing Terraform...
      - curl -o terraform.zip https://releases.hashicorp.com/terraform/1.5.0/terraform_1.5.0_linux_amd64.zip
      - unzip terraform.zip
      - mv terraform /usr/local/bin/
      - rm terraform.zip
      - terraform --version
      - echo Build started on `date`
      - echo Checking for Dockerfile...
      - ls -al Dockerfile

  build:
    commands:
      - aws s3 cp $S3_BUCKET/env.backend .env
      - echo Building the Docker image...
      - docker build --build-arg PUBLIC_URL=https://www.kush.jewelry -t kush-e-commerce-back:$CODEBUILD_BUILD_NUMBER .
      - echo Tagging the Docker image...
      - docker tag kush-e-commerce-back:$CODEBUILD_BUILD_NUMBER $ECR_REPO_ARN:$CODEBUILD_BUILD_NUMBER
      - echo Pushing the Docker image to ECR...
      - docker push $ECR_REPO_ARN:$CODEBUILD_BUILD_NUMBER
      - echo Build completed on `date`
      - cd ci/ecs_service 
      - export TF_VAR_image_tag=$CODEBUILD_BUILD_NUMBER
      - export TF_VAR_environment=$ENVIRONMENT
      - export TF_VAR_terraform_state_bucket=$TERRAFORM_STATE_BUCKET
      - terraform init -backend-config $ENVIRONMENT.config
      - terraform apply -auto-approve
